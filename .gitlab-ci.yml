stages:
  - release

variables:
  GIT_DEPTH: 0
  # 公司 runner 只能拉内网镜像库；沿用现有 CI golang 镜像
  GO_IMAGE: dockerhub.deepglint.com/ci/golang:1.25.3-8

# 仅在 v* tag 时发版。CI Variable: GITLAB_TOKEN（api，Masked）
# 构建用 scripts/release.sh（纯 Go 交叉编译 + Packages/Release 附件）
release:
  stage: release
  image: $GO_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\./
  script:
    - |
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "缺少 CI/CD Variable: GITLAB_TOKEN（api 权限）" >&2
        exit 1
      fi
    - command -v zip >/dev/null || (apt-get update -qq && apt-get install -y -qq zip >/dev/null)
    - bash scripts/release.sh "$CI_COMMIT_TAG"
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
